<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Simple To-Do</title>
    <style>
        body { 
        font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { margin-top: 0; color: #333; }
        input { width: 70%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #eee; margin-bottom: 5px; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>My Tasks</h2>
    <input type="text" id="taskInput" placeholder="What needs doing?">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
</div>

<script>
    // JavaScript: The "Brain" of the app
    function addTask() {
        const input = document.getElementById('taskInput');
        const taskText = input.value;

        if (taskText === '') return; // Don't add empty tasks

        const li = document.createElement('li');
        li.innerHTML = `
            ${taskText} 
            <span class="delete-btn" onclick="this.parentElement.remove()">X</span>
        `;
        
        document.getElementById('taskList').appendChild(li);
        input.value = ''; // Clear input for the next task
    }
</script>

</body>
</html>
